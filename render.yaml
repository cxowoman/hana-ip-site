services:
  - type: web
    name: hana-ip-site
    runtime: python
    plan: starter
    region: singapore
    buildCommand: python -m py_compile site_server.py
    startCommand: python site_server.py --host 0.0.0.0 --port $PORT
    envVars:
      - key: HANA_DATA_DIR
        value: /var/data
      - key: HANA_ADMIN_USER
        value: hana31923
      - key: HANA_ADMIN_PASSWORD
        sync: false
    disk:
      name: hana-ip-site-data
      mountPath: /var/data
      sizeGB: 1
